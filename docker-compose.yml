services:
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  worker:
    build:
      context: .
      dockerfile: deploy/docker/worker.Dockerfile
    depends_on:
      - redis
    environment:
      TASKFORGE_HTTP_ADDR: :8080
      TASKFORGE_METRICS_ADDR: :8080
      TASKFORGE_REDIS_ADDR: redis:6379
      TASKFORGE_SERVICE_NAME: taskforge-worker
    ports:
      - "8081:8080"

  scheduler:
    build:
      context: .
      dockerfile: deploy/docker/scheduler.Dockerfile
    depends_on:
      - redis
    environment:
      TASKFORGE_HTTP_ADDR: :8080
      TASKFORGE_METRICS_ADDR: :8080
      TASKFORGE_REDIS_ADDR: redis:6379
      TASKFORGE_SERVICE_NAME: taskforge-scheduler
    ports:
      - "8082:8080"

  api:
    build:
      context: .
      dockerfile: deploy/docker/api.Dockerfile
    depends_on:
      - redis
    environment:
      TASKFORGE_HTTP_ADDR: :8080
      TASKFORGE_METRICS_ADDR: :8080
      TASKFORGE_REDIS_ADDR: redis:6379
      TASKFORGE_SERVICE_NAME: taskforge-api
    ports:
      - "8083:8080"

  prometheus:
    image: prom/prometheus:v3.2.1
    depends_on:
      - worker
      - scheduler
      - api
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
