global:
  scrape_interval: 5s

scrape_configs:
  - job_name: taskforge-worker
    static_configs:
      - targets: ["worker:8080"]

  - job_name: taskforge-scheduler
    static_configs:
      - targets: ["scheduler:8080"]

  - job_name: taskforge-api
    static_configs:
      - targets: ["api:8080"]
